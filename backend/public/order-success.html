<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pembayaran Berhasil - FoodOnline</title>
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body {
            background: var(--light-bg);
        }

        .success-header {
            background: white;
            padding: 16px 40px;
            border-bottom: 1px solid var(--border-color);
            box-shadow: var(--shadow-md);
            margin-bottom: 40px;
        }

        .success-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            color: var(--text-dark);
        }

        .success-container {
            max-width: 500px;
            margin: 50px auto;
            background: white;
            padding: 40px;
            border-radius: var(--radius-lg);
            text-align: center;
            box-shadow: var(--shadow);
        }

        .success-icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: scaleIn 0.5s ease-out;
        }

        @keyframes scaleIn {
            from {
                transform: scale(0);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .success-message {
            color: var(--success);
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 10px;
        }

        .success-subtitle {
            color: var(--text-light);
            font-size: 14px;
            margin-bottom: 30px;
        }

        .order-info {
            background: var(--light-bg);
            padding: 20px;
            border-radius: var(--radius);
            margin-bottom: 30px;
            text-align: left;
            border: 1px solid var(--border-color);
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            font-size: 14px;
        }

        .info-label {
            color: var(--text-light);
        }

        .info-value {
            color: var(--text-dark);
            font-weight: 700;
        }

        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        @media (max-width: 480px) {
            .action-buttons {
                grid-template-columns: 1fr;
            }
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: var(--radius);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(255, 107, 53, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 107, 53, 0.4);
        }

        .btn-secondary {
            background: var(--light-bg);
            color: var(--text-dark);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: var(--border-color);
        }

        .navbar-nav {
            display: flex;
            gap: 20px;
            margin-left: auto;
        }

        .navbar-nav a {
            color: white;
            text-decoration: none;
            transition: opacity 0.3s;
        }

        .navbar-nav a:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="success-header">
        <h1>✅ Pembayaran Berhasil!</h1>
    </div>

    <div class="success-container">
        <div class="success-icon">🎉</div>
        <div class="success-message">Pesanan Diterima!</div>
        <div class="success-subtitle">Terima kasih telah berbelanja di FoodOnline. Pesanan Anda sedang diproses.</div>

        <div class="order-info" id="orderInfo">
            <div class="info-item">
                <span class="info-label">📦 ID Pesanan:</span>
                <span class="info-value" id="orderId">-</span>
            </div>
            <div class="info-item">
                <span class="info-label">Status:</span>
                <span class="info-value">Menunggu Konfirmasi</span>
            </div>
            <div class="info-item">
                <span class="info-label">Total Pembayaran:</span>
                <span class="info-value" id="totalAmount">Rp 0</span>
            </div>
        </div>

        <div class="action-buttons">
            <a href="/" class="btn btn-secondary">Lanjut Belanja</a>
            <a href="/orders.html" class="btn btn-primary">Lihat Pesanan</a>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const orderId = params.get("orderId");
        const token = localStorage.getItem("token");

        if (!token) {
            window.location.href = "/login.html";
        }

        if (orderId) {
            document.getElementById("orderId").textContent = orderId;

            // Fetch order details
            fetch(`/api/checkout/order/${orderId}`, {
                headers: {
                    Authorization: `Bearer ${token}`,
                },
            })
                .then((res) => res.json())
                .then((data) => {
                    if (data.success) {
                        const total = data.order.total;
                        document.getElementById("totalAmount").textContent = formatCurrency(total);
                    }
                })
                .catch((err) => console.error("Error fetching order:", err));
        }

        function formatCurrency(value) {
            return new Intl.NumberFormat("id-ID", {
                style: "currency",
                currency: "IDR",
            }).format(value);
        }

        function logout() {
            localStorage.removeItem("token");
            localStorage.removeItem("user");
            window.location.href = "/login.html";
        }

        // Clear cart
        localStorage.removeItem("cart");
    </script>
</body>
</html>
