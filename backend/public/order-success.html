<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pembayaran Berhasil - FoodOnline</title>
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body {
            background: var(--light-bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .success-header {
            background: white;
            padding: 20px 40px;
            border-bottom: 1px solid var(--border-color);
            box-shadow: var(--shadow-md);
        }

        .success-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            color: var(--success);
            margin: 0;
        }

        .success-container {
            max-width: 600px;
            margin: 60px auto;
            background: white;
            padding: 40px;
            border-radius: var(--radius-lg);
            text-align: center;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
        }

        .success-icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: scaleIn 0.5s ease-out;
            display: block;
        }

        @keyframes scaleIn {
            from {
                transform: scale(0);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .success-message {
            color: var(--success);
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 800;
            margin: 0 0 8px 0;
        }

        .success-subtitle {
            color: var(--text-light);
            font-size: 14px;
            margin: 0 0 28px 0;
            line-height: 1.5;
        }

        .order-info {
            background: var(--light-bg);
            padding: 20px;
            border-radius: var(--radius);
            margin-bottom: 28px;
            border: 1px solid var(--border-color);
            text-align: left;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-color);
            font-size: 14px;
        }

        .info-item:last-child {
            border-bottom: none;
        }

        .info-label {
            color: var(--text-light);
            font-weight: 500;
        }

        .info-value {
            color: var(--text-dark);
            font-weight: 700;
            text-align: right;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: var(--radius);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            min-width: 150px;
            justify-content: center;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(44, 44, 44, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(44, 44, 44, 0.4);
        }

        .btn-secondary {
            background: var(--light-bg);
            color: var(--text-dark);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: var(--border-color);
        }

        @media (max-width: 640px) {
            .success-header {
                padding: 16px 20px;
            }

            .success-container {
                margin: 40px auto;
                padding: 24px;
            }

            .success-message {
                font-size: 24px;
            }

            .success-icon {
                font-size: 60px;
            }

            .action-buttons {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="success-header">
        <h1>Pembayaran Berhasil</h1>
    </div>

    <div class="success-container">
        <span class="success-icon">🎉</span>
        <div class="success-message">Pesanan Diterima!</div>
        <div class="success-subtitle">
            Terima kasih telah berbelanja di FoodOnline. Pesanan Anda sedang diproses.
        </div>

        <div class="order-info">
            <div class="info-item">
                <span class="info-label">ID Pesanan:</span>
                <span class="info-value" id="orderId">-</span>
            </div>
            <div class="info-item">
                <span class="info-label">Status:</span>
                <span class="info-value">Menunggu Konfirmasi</span>
            </div>
            <div class="info-item">
                <span class="info-label">Total Pembayaran:</span>
                <span class="info-value" id="totalAmount">Rp 0</span>
            </div>
        </div>

        <div class="action-buttons">
            <a href="/" class="btn btn-secondary">
                ← Lanjut Belanja
            </a>
            <a href="/" onclick="showPage('orders'); return false;" class="btn btn-primary">
                🛒 Lihat Pesanan
            </a>
        </div>
    </div>

    <script src="/js/app.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const orderId = params.get("orderId");
        const token = localStorage.getItem("token");

        if (!token) {
            window.location.href = "/login.html";
        }

        if (orderId) {
            document.getElementById("orderId").textContent = orderId;

            // Fetch order details
            fetch(`/api/checkout/order/${orderId}`, {
                headers: {
                    Authorization: `Bearer ${token}`,
                },
            })
                .then((res) => res.json())
                .then((data) => {
                    if (data.success) {
                        const total = data.order.total;
                        document.getElementById("totalAmount").textContent = formatCurrency(total);
                    }
                })
                .catch((err) => console.error("Error fetching order:", err));
        }

        function formatCurrency(value) {
            return new Intl.NumberFormat("id-ID", {
                style: "currency",
                currency: "IDR",
            }).format(value);
        }

        // Clear cart
        localStorage.removeItem("cart_v1");
    </script>
</body>
</html>
