<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Healthy Food</title>
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>

<div class="auth-container">
  <div class="auth-left">
    <h1>Healthy Food</h1>
    <p>Pesan makanan lezat dengan mudah dan cepat. Nikmati pengalaman berbelanja yang menyenangkan!</p>
  </div>
  
  <div class="auth-right">
    <div class="card">
      <h2>Login</h2>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="Masukkan email Anda" />
      </div>
      
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-pass" placeholder="Masukkan password" />
      </div>

      <button class="btn-primary" id="btn-login">Masuk</button>

      <p class="switch">
        Belum punya akun? <a href="register.html">Daftar di sini</a>
      </p>
    </div>
  </div>
</div>

<script>
const API_AUTH = "/api/auth";

document.getElementById("btn-login").addEventListener("click", async ()=>{
  const email = document.getElementById("login-email").value;
  const pass = document.getElementById("login-pass").value;

  if(!email || !pass) return alert("Isi email dan password!");

  const res = await fetch(API_AUTH + "/login", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ email, password:pass })
  });

  const j = await res.json();
  if(!j.success) return alert(j.msg || "Login gagal");

  localStorage.setItem("token", j.token);
  localStorage.setItem("user", JSON.stringify(j.user));

  alert("Login berhasil!");
  
  // Delay untuk memastikan localStorage ter-save sebelum redirect
  setTimeout(() => {
    window.location.href = "index.html";
  }, 500);
});
</script>

</body>
</html>
