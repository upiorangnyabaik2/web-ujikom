<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Healthy Food</title>
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-container">
    <!-- LEFT SECTION: FORM -->
    <div class="auth-form-section">
      <div class="auth-header">
        <h1 class="brand-name">Healthy Food</h1>
      </div>

      <div class="auth-card">
        <h2>Login</h2>

        <div class="form-group">
          <label>Username</label>
          <input type="email" id="login-email" placeholder="Enter your email" />
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-pass" placeholder="Enter password" />
        </div>

        <button class="btn-primary" id="btn-login">Login</button>

        <p class="switch">Belum punya akun? <a href="register.html">Daftar di sini</a></p>
      </div>
    </div>

    <!-- RIGHT SECTION: IMAGE -->
    <div class="auth-image-section">
      <img src="img/bg1.jpg" alt="MixBowls" class="auth-hero-image" />
    </div>
  </div>
</div>

<script>
const API_AUTH = "/api/auth";

document.getElementById("btn-login").addEventListener("click", async ()=>{
  const email = document.getElementById("login-email").value;
  const pass = document.getElementById("login-pass").value;

  if(!email || !pass) return alert("Isi email dan password!");

  const res = await fetch(API_AUTH + "/login", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ email, password:pass })
  });

  const j = await res.json();
  if(!j.success) return alert(j.msg || "Login gagal");

  localStorage.setItem("token", j.token);
  localStorage.setItem("user", JSON.stringify(j.user));

  alert("Login berhasil!");
  
  // Delay untuk memastikan localStorage ter-save sebelum redirect
  setTimeout(() => {
    window.location.href = "index.html";
  }, 500);
});
</script>

<script src="js/auth.js"></script>

</body>
</html>
