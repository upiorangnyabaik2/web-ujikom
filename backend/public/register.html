<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register - Healthy Food</title>
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>

<div class="auth-container">
  <div class="auth-left">
    <h1>🍔 FoodOnline</h1>
    <p>Bergabunglah dengan ribuan pengguna yang sudah menikmati kemudahan memesan makanan lezat online!</p>
  </div>
  
  <div class="auth-right">
    <div class="card">
      <h2>Daftar</h2>

      <div class="form-group">
        <label>Nama Lengkap</label>
        <input type="text" id="reg-name" placeholder="Masukkan nama lengkap" />
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="Masukkan email Anda" />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="reg-pass" placeholder="Masukkan password" />
      </div>

      <button class="btn-primary" id="btn-register">Daftar Sekarang</button>

      <p class="switch">
        Sudah punya akun? <a href="login.html">Masuk di sini</a>
      </p>
    </div>
  </div>
</div>

<script>
const API_AUTH = "/api/auth";

document.getElementById("btn-register").addEventListener("click", async ()=>{
  const name = document.getElementById("reg-name").value;
  const email = document.getElementById("reg-email").value;
  const pass = document.getElementById("reg-pass").value;

  if(!name || !email || !pass) return alert("Semua field wajib diisi!");

  const res = await fetch(API_AUTH + "/register", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ name, email, password:pass })
  });

  const j = await res.json();
  if(!j.success) return alert(j.msg || "Register gagal");

  alert("Register berhasil! Silakan login.");
  
  // Delay untuk memastikan data ter-save
  setTimeout(() => {
    window.location.href = "login.html";
  }, 500);
});
</script>

</body>
</html>
