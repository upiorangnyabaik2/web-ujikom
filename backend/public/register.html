<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register - Healthy Food</title>
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-container">
    <!-- LEFT SECTION: FORM -->
    <div class="auth-form-section">
      <div class="auth-header">
        <h1 class="brand-name">Healthy Food</h1>
      </div>

      <div class="auth-card">
        <h2>Register</h2>

        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="reg-name" placeholder="Enter your full name" />
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" id="reg-email" placeholder="Enter your email" />
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" id="reg-pass" placeholder="Enter password" />
        </div>

        <button class="btn-primary" id="btn-register">Register</button>

        <p class="switch">Sudah punya akun? <a href="login.html">Masuk di sini</a></p>
      </div>
    </div>

    <!-- RIGHT SECTION: IMAGE -->
    <div class="auth-image-section">
      <img src="img/logo.png" alt="MixBowls" class="auth-hero-image" />
    </div>
  </div>
</div>

<script>
const API_AUTH = "/api/auth";

document.getElementById("btn-register").addEventListener("click", async ()=>{
  const name = document.getElementById("reg-name").value;
  const email = document.getElementById("reg-email").value;
  const pass = document.getElementById("reg-pass").value;

  if(!name || !email || !pass) return alert("Semua field wajib diisi!");

  const res = await fetch(API_AUTH + "/register", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ name, email, password:pass })
  });

  const j = await res.json();
  if(!j.success) return alert(j.msg || "Register gagal");

  alert("Register berhasil! Silakan login.");
  
  // Delay untuk memastikan data ter-save
  setTimeout(() => {
    window.location.href = "login.html";
  }, 500);
});
</script>

<script src="js/auth.js"></script>

</body>
</html>
